<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">OS Naters Titelbild</title>
  <desc id="desc">Illustratives Titelbild für die Projektwebseite der OS Naters.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5278b2" />
      <stop offset="100%" stop-color="#7ea6d9" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7aa784" />
      <stop offset="100%" stop-color="#4f7b59" />
    </linearGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#sky)" />
  <polygon points="0,360 260,170 540,360" fill="#385b45" />
  <polygon points="340,360 700,120 1060,360" fill="#2f4f3b" />
  <rect x="720" y="160" width="780" height="255" fill="#d7dce2" stroke="#9aa2ac" stroke-width="4" />
  <rect x="775" y="205" width="670" height="175" fill="#b9c2cc" />

  <g stroke="#98a1ab" stroke-width="2">
    <line x1="830" y1="205" x2="830" y2="380" />
    <line x1="895" y1="205" x2="895" y2="380" />
    <line x1="960" y1="205" x2="960" y2="380" />
    <line x1="1025" y1="205" x2="1025" y2="380" />
    <line x1="1090" y1="205" x2="1090" y2="380" />
    <line x1="1155" y1="205" x2="1155" y2="380" />
    <line x1="1220" y1="205" x2="1220" y2="380" />
    <line x1="1285" y1="205" x2="1285" y2="380" />
    <line x1="1350" y1="205" x2="1350" y2="380" />
    <line x1="1415" y1="205" x2="1415" y2="380" />

    <line x1="775" y1="240" x2="1445" y2="240" />
    <line x1="775" y1="275" x2="1445" y2="275" />
    <line x1="775" y1="310" x2="1445" y2="310" />
    <line x1="775" y1="345" x2="1445" y2="345" />
  </g>

  <rect y="360" width="1600" height="140" fill="url(#ground)" />

  <text x="70" y="95" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="700">OS Naters</text>
  <text x="70" y="145" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30">Projektgalerie – Titelbild</text>
</svg>
